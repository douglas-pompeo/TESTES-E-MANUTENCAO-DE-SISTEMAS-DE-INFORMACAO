<html>

<head>
    <title>Calculadora</title>
    <script>
        function somar() {
            const number1 = parseFloat(document.getElementById("num1").value);
            const number2 = parseFloat(document.getElementById("num2").value);
            document.getElementById("resultado").innerHTML =
                "Resultado: " + (number1 + number2);
        }
        function subtrair() {
            const number1 = parseFloat(document.getElementById("num1").value);
            const number2 = parseFloat(document.getElementById("num2").value);
            document.getElementById("resultado").innerHTML =
                "Resultado: " + (number1 - number2);
        }
        function dividir() {
            const number1 = parseFloat(document.getElementById("num1").value);
            const number2 = parseFloat(document.getElementById("num2").value);
            document.getElementById("resultado").innerHTML =
                "Resultado: " + (number1 / number2);
        }
        function multiplicar() {
            const number1 = parseFloat(document.getElementById("num1").value);
            const number2 = parseFloat(document.getElementById("num2").value);
            document.getElementById("resultado").innerHTML =
                "Resultado: " + (number1 * number2);
        }
        function testarcomponente() {

            let resultadoTeste = "";

            document.getElementById("num1").value = 8;
            document.getElementById("num2").value = 2;

            document.querySelector("button").click();

            if (document.getElementById("resultado").innerHTML === "Resultado: 10") {
                resultadoTeste = "Teste de componente: OK";
            } else {
                resultadoTeste = "Teste de componente: FALHOU";
            }
            document.getElementById("testes").innerHTML = resultadoTeste;
        }
    </script>
</head>

<body>
    <h1>Calculadora Básica</h1>
    <input id="num1" type="number">
    <input id="num2" type="number">
    <button onclick="somar()">+</button>
    <button onclick="subtrair()">-</button>
    <button onclick="dividir()">/</button>
    <button onclick="multiplicar()">x</button>
    <button onclick="testarcomponente()">Executar Teste</button>
    <div id="testes"></div>
    <div id="resultado"></div>
</body>

</html>
