<html>

<head>
    <title>Calculadora</title>
    <script>
        function validarCampos() {
            const input1 = document.getElementById("num1").value;
            const input2 = document.getElementById("num2").value;
            if (input1 === "" || input2 === "") {
                document.getElementById("resultado").innerHTML = "Por favor, preencha ambos os campos!";
                return false;
            }
            return true;
        }
        function somar() {
            if (!validarCampos()) return;
            const number1 = parseFloat(document.getElementById("num1").value);
            const number2 = parseFloat(document.getElementById("num2").value);
            document.getElementById("resultado").innerHTML =
                "Resultado: " + (number1 + number2);
        }
        function subtrair() {
            if (!validarCampos()) return;
            const number1 = parseFloat(document.getElementById("num1").value);
            const number2 = parseFloat(document.getElementById("num2").value);
            document.getElementById("resultado").innerHTML =
                "Resultado: " + (number1 - number2);
        }
        function dividir() {
            if (!validarCampos()) return;
            const number1 = parseFloat(document.getElementById("num1").value);
            const number2 = parseFloat(document.getElementById("num2").value);
            document.getElementById("resultado").innerHTML =
                "Resultado: " + (number1 / number2);
        }
        function multiplicar() {
            if (!validarCampos()) return;
            const number1 = parseFloat(document.getElementById("num1").value);
            const number2 = parseFloat(document.getElementById("num2").value);
            document.getElementById("resultado").innerHTML =
                "Resultado: " + (number1 * number2);
        }
        function porcentagem() {
            const number1 = parseFloat(document.getElementById("num1").value);
            const number2 = parseFloat(document.getElementById("num2").value);
            if (!isNaN(number1) && !isNaN(number2)) {
                resultado = (number1 / 100) * number2;
                document.getElementById("resultado").innerHTML =
                    "Resultado: " + resultado;
            }
            else if (isNaN(number1) && !isNaN(number2)) {
                resultado = number2 / 100;
                document.getElementById("resultado").innerHTML = "Resultado: " + resultado;
            }
            else if (!isNaN(number1)) {
                resultado = number1 / 100;
                document.getElementById("resultado").innerHTML = "Resultado: " + resultado;
            }
            else {
                document.getElementById("resultado").innerHTML = "Por favor, digite um número.";
            }
        }
    </script>
</head>

<body>
    <h1>Calculadora Básica</h1>
    <input id="num1" type="number" placeholder="Primeiro número">
    <input id="num2" type="number" placeholder="Segundo número">
    <button onclick="somar()">+</button>
    <button onclick="subtrair()">-</button>
    <button onclick="dividir()">/</button>
    <button onclick="multiplicar()">x</button>
    <button onclick="porcentagem()">%</button>
    <div id="resultado"></div>
</body>

</html>
